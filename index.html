<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title"></title>
<meta name="description" id="meta-description">
<meta name="keywords" id="meta-keywords">
<meta property="og:title" id="og-title">
<meta property="og:description" id="og-description">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root {
    --blue: #3771e7;
    --blue-dark: #2558c8;
    --blue-light: #5a8df0;
    --blue-xlight: #e8effd;
    --blue-xxlight: #f4f7fe;
    --white: #ffffff;
    --off-white: #f8f9fc;
    --slate-50: #f8fafc;
    --slate-100: #f1f5f9;
    --slate-200: #e2e8f0;
    --slate-300: #cbd5e1;
    --slate-400: #94a3b8;
    --slate-500: #64748b;
    --slate-600: #475569;
    --slate-700: #334155;
    --slate-800: #1e293b;
    --slate-900: #0f172a;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 12px;
    --radius-lg: 20px;
    --shadow-sm: 0 1px 3px rgba(55,113,231,0.08), 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 4px 16px rgba(55,113,231,0.10), 0 2px 8px rgba(0,0,0,0.05);
    --shadow-lg: 0 16px 48px rgba(55,113,231,0.14), 0 4px 16px rgba(0,0,0,0.06);
    --shadow-xl: 0 32px 80px rgba(55,113,231,0.18), 0 8px 24px rgba(0,0,0,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--white);
    color: var(--slate-700);
    line-height: 1.65;
    overflow-x: hidden;
    font-size: 15px;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--slate-100); }
  ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 99px; }

  /* ─── UTILITY ─── */
  .container { max-width: 1160px; margin: 0 auto; padding: 0 24px; }
  .section-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-display); font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--blue); background: var(--blue-xxlight);
    border: 1px solid var(--blue-xlight);
    padding: 6px 14px; border-radius: 99px;
    margin-bottom: 18px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(34px, 4.5vw, 54px);
    font-weight: 700; color: var(--slate-900);
    line-height: 1.05; margin-bottom: 14px;
    letter-spacing: -0.01em;
  }
  .section-subtitle {
    color: var(--slate-500); font-size: 16px;
    max-width: 560px; line-height: 1.6;
    margin-bottom: 56px;
  }
  .section-header { text-align: center; }
  .section-header .section-subtitle { margin-left: auto; margin-right: auto; }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideRight { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(55,113,231,0.3); }
    70% { box-shadow: 0 0 0 14px rgba(55,113,231,0); }
    100% { box-shadow: 0 0 0 0 rgba(55,113,231,0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes gradMove {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .reveal {
    opacity: 0; transform: translateY(30px);
    transition: opacity 0.65s cubic-bezier(.22,.68,0,1.2), transform 0.65s cubic-bezier(.22,.68,0,1.2);
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ─── NAV ─── */
  #navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    padding: 0 24px;
    transition: all 0.3s ease;
  }
  #navbar.scrolled {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--slate-200);
    box-shadow: var(--shadow-sm);
  }
  .nav-inner {
    max-width: 1160px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .nav-logo {
    font-family: var(--font-display); font-weight: 800; font-size: 20px;
    color: var(--slate-900); text-decoration: none; letter-spacing: -0.03em;
  }
  .nav-logo span { color: var(--blue); }
  .nav-links {
    display: flex; align-items: center; gap: 6px;
    list-style: none;
  }
  .nav-links a {
    font-family: var(--font-body); font-size: 13.5px; font-weight: 500;
    color: var(--slate-600); text-decoration: none;
    padding: 7px 12px; border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }
  .nav-links a:hover { color: var(--blue); background: var(--blue-xxlight); }
  .nav-cta {
    background: var(--blue); color: white !important;
    padding: 8px 18px !important; border-radius: 8px !important;
    font-weight: 600 !important;
    box-shadow: 0 2px 10px rgba(55,113,231,0.3);
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s !important;
  }
  .nav-cta:hover { background: var(--blue-dark) !important; color: white !important; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(55,113,231,0.4) !important; }

  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; padding: 8px; border: none; background: none;
  }
  .hamburger span {
    display: block; width: 22px; height: 2px;
    background: var(--slate-700); border-radius: 2px;
    transition: all 0.3s;
  }
  .mobile-menu {
    display: none; position: fixed; top: 68px; left: 0; right: 0;
    background: white; border-bottom: 1px solid var(--slate-200);
    padding: 16px 24px 24px; z-index: 999;
    box-shadow: var(--shadow-lg);
    flex-direction: column; gap: 4px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    font-family: var(--font-body); font-size: 15px; font-weight: 500;
    color: var(--slate-700); text-decoration: none;
    padding: 11px 14px; border-radius: 8px;
    transition: background 0.2s, color 0.2s;
  }
  .mobile-menu a:hover { background: var(--blue-xxlight); color: var(--blue); }

  /* ─── HERO ─── */
  #hero {
    min-height: 100vh; display: flex; align-items: center;
    padding: 100px 0 80px;
    background: linear-gradient(160deg, #ffffff 0%, #f0f5ff 50%, #e8effe 100%);
    position: relative; overflow: hidden;
  }
  .hero-bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(55,113,231,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(55,113,231,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 40%, transparent 100%);
  }
  .hero-orb-1 {
    position: absolute; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(55,113,231,0.12) 0%, transparent 70%);
    top: -100px; right: -100px; pointer-events: none;
    animation: float 8s ease-in-out infinite;
  }
  .hero-orb-2 {
    position: absolute; width: 350px; height: 350px; border-radius: 50%;
    background: radial-gradient(circle, rgba(90,141,240,0.09) 0%, transparent 70%);
    bottom: -50px; left: -80px; pointer-events: none;
    animation: float 10s ease-in-out infinite 2s;
  }
  .hero-content {
    position: relative; z-index: 1;
    animation: fadeUp 0.8s cubic-bezier(.22,.68,0,1.2) both;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-display); font-size: 11.5px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--blue); background: white;
    border: 1px solid var(--blue-xlight);
    padding: 7px 16px; border-radius: 99px;
    margin-bottom: 28px;
    box-shadow: 0 2px 10px rgba(55,113,231,0.12);
    animation: fadeUp 0.7s 0.1s both;
  }
  .hero-badge-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--blue);
    animation: pulse-ring 2s infinite;
  }
  .hero-name {
    font-family: var(--font-display);
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 700; color: var(--slate-900);
    line-height: 0.95; letter-spacing: -0.01em;
    margin-bottom: 14px;
    animation: fadeUp 0.7s 0.2s both;
  }
  .hero-name .name-highlight {
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-tagline {
    font-family: var(--font-display);
    font-size: clamp(20px, 2.8vw, 32px);
    font-weight: 600; font-style: italic;
    color: var(--slate-600);
    margin-bottom: 22px; letter-spacing: 0;
    animation: fadeUp 0.7s 0.3s both;
  }
  .hero-tagline .tag-sep { color: var(--blue-light); margin: 0 8px; }
  .hero-desc {
    font-size: 16px; color: var(--slate-500); line-height: 1.7;
    max-width: 580px; margin-bottom: 40px;
    animation: fadeUp 0.7s 0.4s both;
  }
  .hero-ctas {
    display: flex; flex-wrap: wrap; gap: 12px;
    animation: fadeUp 0.7s 0.5s both;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-body); font-weight: 600; font-size: 14px;
    padding: 12px 22px; border-radius: 10px;
    text-decoration: none; cursor: pointer; border: none;
    transition: all 0.2s cubic-bezier(.22,.68,0,1.2);
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--blue); color: white;
    box-shadow: 0 4px 16px rgba(55,113,231,0.35);
  }
  .btn-primary:hover {
    background: var(--blue-dark); transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(55,113,231,0.45);
  }
  .btn-outline {
    background: white; color: var(--slate-700);
    border: 1.5px solid var(--slate-200);
    box-shadow: var(--shadow-sm);
  }
  .btn-outline:hover {
    border-color: var(--blue); color: var(--blue);
    transform: translateY(-2px); box-shadow: var(--shadow);
  }
  .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ─── ABOUT ─── */
  #about { padding: 100px 0; background: white; }
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center;
  }
  .about-text p {
    color: var(--slate-600); font-size: 15.5px; line-height: 1.75;
    margin-bottom: 18px;
  }
  .exp-badge-row { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 32px; }
  .exp-badge {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    background: var(--blue-xxlight);
    border: 1.5px solid var(--blue-xlight);
    border-radius: var(--radius); padding: 18px 24px;
    min-width: 110px; flex: 1;
  }
  .exp-badge .num {
    font-family: var(--font-display); font-size: 32px; font-weight: 800;
    color: var(--blue); line-height: 1; margin-bottom: 4px;
  }
  .exp-badge .lbl {
    font-size: 11.5px; font-weight: 600; color: var(--slate-500);
    text-transform: uppercase; letter-spacing: 0.07em; text-align: center;
  }
  .about-visual { position: relative; }
  .about-card-main {
    background: var(--blue);
    border-radius: var(--radius-lg);
    padding: 36px 32px;
    color: white;
    box-shadow: var(--shadow-xl);
    position: relative; overflow: hidden;
  }
  .about-card-main::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 180px; height: 180px; border-radius: 50%;
    background: rgba(255,255,255,0.07);
  }
  .about-card-main::after {
    content: '';
    position: absolute; bottom: -30px; left: -30px;
    width: 130px; height: 130px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .about-card-name {
    font-family: var(--font-display); font-size: 22px; font-weight: 800;
    margin-bottom: 4px; position: relative; z-index: 1;
  }
  .about-card-role {
    font-size: 13px; opacity: 0.8; margin-bottom: 24px;
    position: relative; z-index: 1;
  }
  .about-card-stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; position: relative; z-index: 1;
  }
  .about-stat {
    background: rgba(255,255,255,0.12);
    border-radius: 10px; padding: 14px;
    backdrop-filter: blur(10px);
  }
  .about-stat .n {
    font-family: var(--font-display); font-size: 24px; font-weight: 800;
    line-height: 1;
  }
  .about-stat .l {
    font-size: 11px; opacity: 0.75; margin-top: 3px; text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .about-card-float {
    position: absolute; bottom: -24px; right: -16px;
    background: white; border-radius: var(--radius);
    padding: 14px 18px;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 10px;
    animation: float 6s ease-in-out infinite;
  }
  .about-card-float .icon-wrap {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--blue-xxlight);
    display: flex; align-items: center; justify-content: center;
    color: var(--blue);
  }
  .about-card-float .icon-wrap svg { width: 18px; height: 18px; }
  .about-card-float strong {
    display: block; font-family: var(--font-display);
    font-size: 14px; font-weight: 700; color: var(--slate-900);
  }
  .about-card-float span { font-size: 11px; color: var(--slate-400); }

  /* ─── EXPERIENCE ─── */
  #experience { padding: 100px 0; background: var(--slate-50); }
  .exp-timeline { position: relative; margin-top: 12px; }
  .exp-timeline::before {
    content: '';
    position: absolute; left: 22px; top: 12px; bottom: 12px; width: 2px;
    background: linear-gradient(to bottom, var(--blue) 0%, var(--blue-xlight) 100%);
    border-radius: 2px;
  }
  .exp-item {
    display: grid; grid-template-columns: 48px 1fr;
    gap: 24px; margin-bottom: 32px;
  }
  .exp-dot {
    width: 46px; height: 46px; border-radius: 50%;
    background: white; border: 2.5px solid var(--blue);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative; z-index: 1;
    box-shadow: 0 0 0 5px var(--slate-50);
    color: var(--blue);
  }
  .exp-dot svg { width: 18px; height: 18px; }
  .exp-card {
    background: white; border-radius: var(--radius-lg);
    padding: 28px 30px;
    border: 1px solid var(--slate-200);
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.25s, transform 0.25s, border-color 0.25s;
  }
  .exp-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateX(4px);
    border-color: var(--blue-xlight);
  }
  .exp-card-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; flex-wrap: wrap; gap: 10px;
    margin-bottom: 4px;
  }
  .exp-role {
    font-family: var(--font-display); font-size: 18px; font-weight: 700;
    color: var(--slate-900);
  }
  .exp-period {
    font-size: 12px; font-weight: 600; color: var(--blue);
    background: var(--blue-xxlight); padding: 4px 12px;
    border-radius: 99px; white-space: nowrap; letter-spacing: 0.04em;
  }
  .exp-company {
    font-size: 13.5px; color: var(--blue); font-weight: 500;
    margin-bottom: 14px;
  }
  .exp-company a { color: inherit; text-decoration: none; }
  .exp-company a:hover { text-decoration: underline; }
  .exp-location { color: var(--slate-400); font-size: 12px; margin-left: 6px; }
  .exp-bullets { list-style: none; padding: 0; }
  .exp-bullets li {
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 14px; color: var(--slate-600);
    line-height: 1.6; margin-bottom: 8px;
  }
  .exp-bullets li::before {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--blue); flex-shrink: 0; margin-top: 8px;
  }

  /* ─── SKILLS ─── */
  #skills { padding: 100px 0; background: white; }
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .skill-group {
    background: var(--slate-50); border-radius: var(--radius-lg);
    padding: 24px; border: 1px solid var(--slate-200);
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
  }
  .skill-group:hover {
    border-color: var(--blue-light);
    box-shadow: var(--shadow);
    transform: translateY(-3px);
  }
  .skill-group-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .skill-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--blue); color: white;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .skill-icon svg { width: 20px; height: 20px; }
  .skill-group-title {
    font-family: var(--font-display); font-size: 15px; font-weight: 700;
    color: var(--slate-800);
  }
  .skill-pills { display: flex; flex-wrap: wrap; gap: 7px; }
  .skill-pill {
    font-size: 12.5px; font-weight: 500; color: var(--slate-600);
    background: white; border: 1px solid var(--slate-200);
    padding: 5px 12px; border-radius: 99px;
    transition: all 0.2s;
  }
  .skill-pill:hover {
    background: var(--blue-xxlight); color: var(--blue);
    border-color: var(--blue-xlight);
  }

  /* ─── PROJECTS ─── */
  #projects { padding: 100px 0; background: var(--slate-50); }
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }
  .project-card {
    background: white; border-radius: var(--radius-lg);
    border: 1px solid var(--slate-200);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s cubic-bezier(.22,.68,0,1.2);
    display: flex; flex-direction: column;
  }
  .project-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-xl);
    border-color: var(--blue-xlight);
  }
  .project-preview {
    height: 180px; overflow: hidden; position: relative;
    background: linear-gradient(135deg, var(--blue-xxlight) 0%, var(--blue-xlight) 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .project-preview-icon {
    width: 64px; height: 64px; border-radius: 16px;
    background: white; display: flex; align-items: center; justify-content: center;
    color: var(--blue); box-shadow: var(--shadow);
  }
  .project-preview-icon svg { width: 32px; height: 32px; }
  .project-preview-label {
    position: absolute; top: 12px; right: 12px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--blue);
    background: white; padding: 4px 10px; border-radius: 99px;
    box-shadow: var(--shadow-sm);
  }
  .project-card.featured .project-preview {
    background: linear-gradient(135deg, var(--blue) 0%, #5b8ef0 100%);
  }
  .project-card.featured .project-preview-icon {
    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(10px);
  }
  .project-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
  .project-title {
    font-family: var(--font-display); font-size: 17px; font-weight: 700;
    color: var(--slate-900); margin-bottom: 6px; line-height: 1.25;
  }
  .project-subtitle {
    font-size: 12.5px; color: var(--blue); font-weight: 600;
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .project-desc {
    font-size: 13.5px; color: var(--slate-500); line-height: 1.65;
    margin-bottom: 16px; flex: 1;
  }
  .project-stack { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .stack-tag {
    font-size: 11.5px; font-weight: 500; color: var(--slate-600);
    background: var(--slate-100); padding: 4px 10px;
    border-radius: 99px; border: 1px solid var(--slate-200);
  }
  .project-links { display: flex; gap: 8px; }
  .proj-btn {

/* ── Helper: build an <svg> element from the icon registry ── */
function icon(name, size = 16) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name] || ''}</svg>`;
}

/* ── Helper: external link attrs ── */
function extAttrs(isExternal) {
  return isExternal ? ' target="_blank" rel="noopener"' : '';
}

/* ── Helper: logo markup (last char before dot stays plain; dot gets colour) ── */
function buildLogoHTML(text) {
  // e.g. 'RAM.' → 'RAM<span>.</span>'
  const dot = text.slice(-1);
  const main = text.slice(0, -1);
  return `${main}<span>${dot}</span>`;
}

function initInteractions() {

  /* ── Navbar scroll effect ── */
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 20);
  });

  /* ── Hamburger mobile menu toggle ── */
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');
  hamburger.addEventListener('click', () => mobileMenu.classList.toggle('open'));

  /* ── Reveal on scroll (IntersectionObserver) ── */
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        revealObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

  /* ── Active nav link highlight on scroll ── */
  const sections  = document.querySelectorAll('section[id]');
  const navLinks  = document.querySelectorAll('.nav-links a');
  window.addEventListener('scroll', () => {
    let current = '';
    sections.forEach(s => {
      if (window.scrollY >= s.offsetTop - 120) current = s.id;
    });
    navLinks.forEach(a => {
      const isActive = a.getAttribute('href') === '#' + current;
      a.style.color      = isActive ? 'var(--blue)' : '';
      a.style.background = isActive ? 'var(--blue-xxlight)' : '';
    });
  });

  /* ── Smooth scroll for anchor links ── */
  document.addEventListener('click', e => {
    const anchor = e.target.closest('a[href^="#"]');
    if (!anchor) return;
    const target = document.querySelector(anchor.getAttribute('href'));
    if (target) {
      e.preventDefault();
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });

}

/* ── Close mobile menu (called inline from rendered mobile nav links) ── */
function closeMobile() {
  document.getElementById('mobileMenu').classList.remove('open');
}

  const form      = document.getElementById('contact-form');
  const submitBtn = document.getElementById('submit-btn');
  const btnDefault = document.getElementById('btn-default');
  const btnLoading = document.getElementById('btn-loading');
  const errorBox   = document.getElementById('form-error');

  errorBox.style.display = 'none';
  submitBtn.disabled = true;
  btnDefault.style.display = 'none';
  btnLoading.style.display = 'flex';

  try {
    const res  = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(form) });
    const json = await res.json();
    if (json.success) {
      form.style.display = 'none';
      document.getElementById('form-success').style.display = 'block';
    } else {
      throw new Error(json.message || 'Submission failed.');
    }
  } catch (err) {
    errorBox.textContent = err.message || 'Something went wrong. Please try emailing directly.';
    errorBox.style.display = 'block';
    submitBtn.disabled = false;
    btnDefault.style.display = 'flex';
    btnLoading.style.display = 'none';
  }
}

/* ── Reset contact form to initial state ── */
function resetForm() {
  const form = document.getElementById('contact-form');
  form.reset();
  form.style.display = 'block';
  document.getElementById('form-success').style.display = 'none';
  document.getElementById('form-error').style.display = 'none';
  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = false;
  document.getElementById('btn-default').style.display = 'flex';
  document.getElementById('btn-loading').style.display = 'none';
}

/* ── Bootstrap ── */
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
